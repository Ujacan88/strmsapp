version: '3.8'

services:
  backend:
    build: ./backend
    container_name: storms_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - DB_PATH=/data/storms.db
    volumes:
      - ./data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error', ()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: nginx:alpine
    container_name: storms_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  backup:
    image: alpine:latest
    container_name: storms_backup
    restart: unless-stopped
    environment:
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-30}
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c", "echo '0 3 * * * /bin/sh /backup.sh >> /backups/backup.log 2>&1' | crontab - && crond -f -l 8"]
    networks:
      - internal

networks:
  internal:
    driver: bridge
